name: 热榜自动推送
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install pillow requests
      - name: 运行
        env:
          DEVICE_ID: ${{ secrets.DEVICE_ID }}
          API_KEY: ${{ secrets.API_KEY }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
        run: python dyhot.py
