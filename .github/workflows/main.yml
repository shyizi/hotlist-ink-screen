name: 墨水屏热榜轮播
on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  run-hot-rank:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          persist-credentials: true # 允许提交回仓库

      - name: 配置Python环境
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行热榜轮播程序
        env:
          DEVICE_ID: ${{ secrets.DEVICE_ID }}
          API_KEY: ${{ secrets.API_KEY }}
          PAGE_ID: 5
          PER_PAGE: 8
          FONT_PATH: font.ttf
        run: |
          python dyhot.py

      - name: 提交状态文件
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add state.json
          git commit -m "更新分页状态" || echo "无状态变更，无需提交"
          git push
